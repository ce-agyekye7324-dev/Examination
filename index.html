<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dream HOUSE</title>
  <script src="Script/aframe.min.js"></script>
  <script src="Script/aframe.js"></script>
  <script>
    AFRAME.registerComponent('water-material', {
      init: function() {
        this.el.setAttribute('material', {
          color: '#00bfff',
          opacity: 0.8,
          transparent: true,
          metalness: 0.6,
          roughness: 0.2,
          shader: 'standard'
        });
      }
    });
  </script>
</head>
<body>
  <a-scene>
    <a-asset>
      <img src="Textures/fk.jpeg" id="floor2" alt="">
      <img src="Textures/clear-sunny-sky.jpg" id="sky" alt="">
      <img src="Textures/floor.jpg" id="floor" alt="">
    </a-asset>
    <a-plane src="#floor2" scale="500 500 500" rotation="-90 0 0"></a-plane>
    <a-sky src="#sky"></a-sky>
    <a-asset-item src="Villa/scene.gltf" id="house">
    </a-asset-item>
    <a-entity gltf-model="#house" position="2 0.5 2" scale="2 2 2"></a-entity>

    <a-asset-item src="tree/scene.gltf" id="tree"></a-asset-item>
    <!-- Tree model with position marker -->
    <a-entity id="tree-group" position="-25 0 -1">
      <!-- The tree model -->
      <a-entity 
        gltf-model="#tree" 
        scale="30 38 30"
        position="55 0 -1"
        rotation="0 0 0">
      </a-entity>
    </a-entity>
    <a-entity id="tree-group" position="4 0 25">
      <!-- The tree model -->
      <a-entity 
        gltf-model="#tree" 
        scale="10 10 10"
        position="10 0 16"
        rotation="0 0 0">
      </a-entity>
    </a-entity>
    <a-entity id="tree-group" position="3 0 25">
      <!-- The tree model -->
      <a-entity 
        gltf-model="#tree" 
        scale="10 10 10"
        position="15 0 16"
        rotation="0 0 0">
      </a-entity>
    </a-entity>

  <a-entity position="-8 0 33">
    <a-entity position="3.4 0.6 -46">
      <!-- Main water surface -->
      <a-box width="13" height="0.2" depth="7.4" water-material
          animation="property: position; dir: alternate; dur: 3500; loop: true; to: 0 0.15 0; easing: easeInOutSine"
          animation__2="property: rotation; dir: alternate; dur: 4000; loop: true; to: 0.5 0 0.5; easing: easeInOutSine">
      </a-box> 
      <!-- Subtle ripple -->
      <a-ring position="0 0.12 0" rotation="90 0 0" radius-inner="2" radius-outer="2.5" material="color: #ffffff; opacity: 0.15; transparent: true"
             animation="property: scale; from: 0.1 0.1 0.1; to: 2 2 2; dur: 3000; loop: true; easing: easeOutQuad">
      </a-ring>
      <a-entity position="0 0.15 0" rotation="90 0 0">
        <a-plane width="13" height="7.4" material="color: #ffffff; opacity: 0.08; transparent: true">
          <a-animation attribute="material.opacity" from="0.08" to="0.12" dur="3000" direction="alternate" repeat="indefinite" easing="easeInOutSine"></a-animation>
        </a-plane>
      </a-entity>
    </a-entity>
  </a-entity>
  <a-entity id="rig" position="0 1.6 5">
    <a-camera  position="3 2 3"></a-camera>
  </a-entity>
    
  </a-scene>
</body>
</html>
